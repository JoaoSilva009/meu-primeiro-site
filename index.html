<!DOCTYPE html>
<html>
<head>
    <title>João Silva</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: linear-gradient(to right, #1e3c72, #2a5298);
            color: white;
            margin-top: 100px;
        }

        button {
            padding: 10px 20px;
            border: none;
            background-color: #ffcc00;
            color: black;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background-color: #ffaa00;
        }
    </style>
</head>
<body>

    <h1>🚀 João Silva</h1>
    <p>Construindo minha jornada no digital</p>

    <button onclick="mostrarMensagem()">Clique aqui</button>

    <p id="mensagem"></p>

    <script>
        function mostrarMensagem() {
            document.getElementById("mensagem").innerText = "Você está evoluindo! 🔥";
        }
    </script>

</body>
</html>
